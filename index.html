  /* ─── MODAL ─── */

  #btn-delete {
    background: #7f1d1d28; border: 1px solid #7f1d1d60; color: var(--red);
    border-radius: 6px; padding: 8px 14px; font-size: 11px; font-weight: 600;

  }

  #btn-cancel {

  #btn-save {

  /* ─── EMPTY STATE ─── */
  #empty-state {

  #loader {

  #loader.show { display: flex; }
  .loader-spin {

  #toast {
    position: fixed; bottom: 20px; right: 24px; background: #1a2740;
    border: 1px solid var(--border2); color: var(--text); border-radius: 7px;
    padding: 10px 16px; font-size: 12px; z-index: 300;
    transform: translateY(20px); opacity: 0; transition: all 0.25s;
    pointer-events: none;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #error-banner {
    background: #450a0a; border-bottom: 1px solid #7f1d1d; color: #fca5a5;
    padding: 10px 24px; font-size: 12px; text-align: center; display: none;
  }
  #error-banner.show { display: block; }
</style>

<!-- Toast -->
<div id="toast"></div>

<!-- ═══════════════════════════════════════════════════════════ -->
<script>
'use strict';

// ─── SUPABASE INIT ───
const { createClient } = supabase;
let db;
try {
  db = createClient(SUPABASE_URL, SUPABASE_ANON);
} catch(e) {
  document.getElementById('error-banner').classList.add('show');
}

// ─── CONFIG ───
const BUCKETS = ['All','Friends','Clients','Prospects','B2B Partners','Competitors','Acquaintances','Investors'];
const BUCKET_COLORS = {
  Friends:        '#4ade80',
  Clients:        '#60a5fa',
  Prospects:      '#f59e0b',
  'B2B Partners': '#a78bfa',
  Competitors:    '#f87171',
  Acquaintances:  '#94a3b8',
  Investors:      '#34d399',
};

// ─── STATE ───
let allContacts    = [];
let filteredList   = [];
let activeBucket   = 'All';
let searchQuery    = '';
let currentView    = 'list';
let sortKey        = 'name';
let sortDir        = 1;
let selectedId     = null;
let editingId      = null;
let formTags       = [];

// ─── UTILS ───
function today() { return new Date().toISOString().split('T')[0]; }

function daysSince(dateStr) {
  if (!dateStr) return null;
  return Math.floor((Date.now() - new Date(dateStr)) / 86400000);
}

function avatarHTML(name, size = 34) {
  const initials = (name || '?').split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();
  const hue = (name || '').split('').reduce((a,c) => a + c.charCodeAt(0), 0) % 360;
  return `<div class="avatar" style="width:${size}px;height:${size}px;font-size:${Math.round(size*0.36)}px;background:hsl(${hue},55%,28%);border:1.5px solid hsl(${hue},55%,42%);color:hsl(${hue},80%,75%)">${initials}</div>`;
}

function pillHTML(bucket) {
  const color = BUCKET_COLORS[bucket] || '#94a3b8';
  return `<span class="bucket-pill" style="background:${color}18;color:${color};border-color:${color}40">${bucket}</span>`;
}

function staleHTML(ds) {
  if (ds === null) return '';
  const stale = ds > 60;
  const bg    = stale ? '#7c2d1220' : '#1e2740';
  const bdr   = stale ? '#7c2d1240' : '#2e3650';
  const lc    = stale ? '#f87171'   : '#64748b';
  const vc    = stale ? '#fca5a5'   : '#94a3b8';
  const label = ds === 0 ? 'Today' : `${ds} days ago`;
  return `<div class="stale-box" style="background:${bg};border-color:${bdr}">
    <span class="stale-label" style="color:${lc}">Last Contact: </span>
    <span style="color:${vc}">${label}</span>
  </div>`;
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2600);
}

function setLoading(msg) {
  const el = document.getElementById('loader');
  if (msg) {
    document.getElementById('loader-text').textContent = msg;
    el.classList.add('show');
  } else {
    el.classList.remove('show');
  }
}

// ─── SUPABASE CRUD ───
async function fetchContacts() {
  if (!db) return;
  setLoading('Loading…');
  const { data, error } = await db.from('people').select('*').order('name');
  setLoading(null);
  if (error) { showError('Failed to load contacts: ' + error.message); return; }
  allContacts = data || [];
  updateTotalCount();
  applyFilters();
}

async function saveContact(payload) {
  if (!db) return;
  setLoading('Saving…');
  let error;
  if (editingId) {
    ({ error } = await db.from('people').update(payload).eq('id', editingId));
  } else {
    ({ error } = await db.from('people').insert(payload));
  }
  setLoading(null);
  if (error) { toast('❌ Save failed: ' + error.message); return; }
  toast(editingId ? '✓ Contact updated' : '✓ Contact added');
  closeModal();
  await fetchContacts();
}

async function deleteContact(id) {
  if (!db) return;
  if (!confirm('Delete this contact? This cannot be undone.')) return;
  setLoading('Deleting…');
  const { error } = await db.from('people').delete().eq('id', id);
  setLoading(null);
  if (error) { toast('❌ Delete failed: ' + error.message); return; }
  toast('✓ Contact deleted');
  selectedId = null;
  closeDetailPane();
  closeModal();
  await fetchContacts();
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = '⚠ ' + msg;
  el.classList.add('show');
}

// ─── FILTER & SORT ───
function applyFilters() {
  let list = [...allContacts];
  if (activeBucket !== 'All') list = list.filter(c => c.bucket === activeBucket);
  if (searchQuery.trim()) {
    const q = searchQuery.toLowerCase();
    list = list.filter(c =>
      (c.name||'').toLowerCase().includes(q) ||
      (c.company||'').toLowerCase().includes(q) ||
      (c.email||'').toLowerCase().includes(q) ||
      (c.bucket||'').toLowerCase().includes(q) ||
      (c.tags||[]).some(t => t.toLowerCase().includes(q))
    );
  }
  list.sort((a,b) => {
    const av = (a[sortKey]||'').toLowerCase();
    const bv = (b[sortKey]||'').toLowerCase();
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });
  filteredList = list;
  renderContacts();
  updateTabCounts();
  document.getElementById('contact-count').textContent = `${filteredList.length} shown`;
}

// ─── RENDER BUCKET TABS ───
function renderBucketBar() {
  const bar = document.getElementById('bucket-bar');
  bar.innerHTML = '';
  BUCKETS.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'bucket-tab' + (b === activeBucket ? ' active' : '');
    btn.dataset.bucket = b;
    const color = BUCKET_COLORS[b] || '#60a5fa';
    if (b === activeBucket) {
      btn.style.color = color;
      btn.style.borderBottomColor = color;
    }
    const count = b === 'All' ? allContacts.length : allContacts.filter(c => c.bucket === b).length;
    btn.innerHTML = `${b} <span class="tab-count">${count}</span>`;
    btn.addEventListener('click', () => {
      activeBucket = b;
      selectedId = null;
      closeDetailPane();
      renderBucketBar();
      applyFilters();
    });
    bar.appendChild(btn);
  });
}

function updateTabCounts() {
  document.querySelectorAll('.bucket-tab').forEach(btn => {
    const b = btn.dataset.bucket;
    const count = b === 'All' ? allContacts.length : allContacts.filter(c => c.bucket === b).length;
    btn.querySelector('.tab-count').textContent = count;
  });
}

function updateTotalCount() {
  document.getElementById('total-count').textContent = `${allContacts.length} contact${allContacts.length !== 1 ? 's' : ''}`;
}

// ─── RENDER CONTACTS ───
function renderContacts() {
  const listView  = document.getElementById('list-view');
  const cardsView = document.getElementById('cards-view');
  const emptyEl   = document.getElementById('empty-state');

  if (filteredList.length === 0) {
    listView.style.display  = 'none';
    cardsView.style.display = 'none';
    emptyEl.classList.add('show');
    return;
  }
  emptyEl.classList.remove('show');

  if (currentView === 'list') {
    listView.style.display  = 'table';
    cardsView.style.display = 'none';
    renderListView();
  } else {
    listView.style.display  = 'none';
    cardsView.style.display = 'grid';
    renderCardsView();
  }
}

function renderListView() {
  const tbody = document.getElementById('list-body');
  tbody.innerHTML = '';
  filteredList.forEach(c => {
    const ds = daysSince(c.last_contact);
    const tr = document.createElement('tr');
    if (c.id === selectedId) tr.classList.add('selected');
    tr.innerHTML = `
      <td>
        <div class="contact-name-cell">
          ${avatarHTML(c.name, 30)}
          <div>
            <div class="contact-name">${esc(c.name)}</div>
            ${c.title ? `<div class="contact-title-small">${esc(c.title)}</div>` : ''}
          </div>
        </div>
      </td>
      <td style="color:var(--text3)">${esc(c.company||'—')}</td>
      <td>${pillHTML(c.bucket)}</td>
      <td class="${ds !== null && ds > 60 ? 'stale-red' : ''}" style="color:var(--text4);font-size:11px">
        ${ds === null ? '—' : ds === 0 ? 'Today' : ds + 'd ago'}
      </td>
      <td><button class="edit-btn-small" data-id="${c.id}">✎</button></td>
    `;
    tr.addEventListener('click', (e) => {
      if (e.target.closest('.edit-btn-small')) return;
      selectContact(c.id === selectedId ? null : c.id);
    });
    tr.querySelector('.edit-btn-small').addEventListener('click', () => openModal(c));
    tbody.appendChild(tr);
  });

  // Sort header highlight
  document.querySelectorAll('#list-view thead th[data-key]').forEach(th => {
    th.classList.toggle('sort-active', th.dataset.key === sortKey);
    const arrow = th.dataset.key === sortKey ? (sortDir === 1 ? ' ↑' : ' ↓') : '';
    th.textContent = th.textContent.replace(/ [↑↓]$/, '') + arrow;
  });
}

function renderCardsView() {
  const grid = document.getElementById('cards-view');
  grid.innerHTML = '';
  filteredList.forEach(c => {
    const ds = daysSince(c.last_contact);
    const color = BUCKET_COLORS[c.bucket] || '#94a3b8';
    const div = document.createElement('div');
    div.className = 'card' + (c.id === selectedId ? ' selected' : '');
    div.style.borderTopColor = color;
    div.innerHTML = `
      <div class="card-header">
        <div style="display:flex;align-items:center;gap:9px">
          ${avatarHTML(c.name, 34)}
          <div class="card-info">
            <div class="card-name">${esc(c.name)}</div>
            <div class="card-sub">${esc(c.title || c.company || c.bucket)}</div>
          </div>
        </div>
        <button class="edit-btn-small" data-id="${c.id}">✎</button>
      </div>
      ${c.company ? `<div class="card-company">🏢 ${esc(c.company)}</div>` : ''}
      ${c.email   ? `<div class="card-email">✉ ${esc(c.email)}</div>` : ''}
      <div class="card-footer">
        ${pillHTML(c.bucket)}
        ${ds !== null ? `<span style="font-size:10px;color:${ds>60?'var(--red)':'var(--text5)'}">${ds}d ago</span>` : ''}
      </div>
      ${(c.tags||[]).length > 0 ? `<div class="card-tags">${c.tags.map(t=>`<span class="card-tag">${esc(t)}</span>`).join('')}</div>` : ''}
    `;
    div.addEventListener('click', (e) => {
      if (e.target.closest('.edit-btn-small')) return;
      selectContact(c.id === selectedId ? null : c.id);
    });
    div.querySelector('.edit-btn-small').addEventListener('click', () => openModal(c));
    grid.appendChild(div);
  });
}

// ─── DETAIL PANE ───
function selectContact(id) {
  selectedId = id;
  renderContacts(); // re-render to update selected highlight
  if (!id) { closeDetailPane(); return; }
  const c = allContacts.find(x => x.id === id);
  if (!c) { closeDetailPane(); return; }
  renderDetailPane(c);
}

function renderDetailPane(c) {
  document.getElementById('detail-pane').classList.add('open');
  document.getElementById('dp-avatar').innerHTML = avatarHTML(c.name, 46);
  document.getElementById('dp-name').textContent = c.name;
  document.getElementById('dp-sub').textContent  = [c.title, c.company].filter(Boolean).join(' · ') || c.bucket;
  document.getElementById('dp-bucket').innerHTML = pillHTML(c.bucket);
  document.getElementById('dp-stale').innerHTML  = staleHTML(daysSince(c.last_contact));

  let fields = '';
  if (c.email)    fields += dpRow('Email', `<a href="mailto:${esc(c.email)}" style="color:#60a5fa;text-decoration:none">${esc(c.email)}</a>`);
  if (c.phone)    fields += dpRow('Phone', `<a href="tel:${esc(c.phone)}" style="color:#60a5fa;text-decoration:none">${esc(c.phone)}</a>`);
  if (c.linkedin) fields += dpRow('LinkedIn', `<a href="${esc(c.linkedin)}" target="_blank" style="color:#60a5fa;text-decoration:none">${esc(c.linkedin)}</a>`);
  if (c.last_contact) fields += dpRow('Date', c.last_contact);
  if ((c.tags||[]).length > 0) {
    fields += `<div class="dp-row"><div class="dp-row-label">Tags</div><div class="dp-tags">${c.tags.map(t=>`<span class="dp-tag">${esc(t)}</span>`).join('')}</div></div>`;
  }
  if (c.notes)    fields += dpRow('Notes', esc(c.notes).replace(/\n/g,'<br>'));
  document.getElementById('dp-fields').innerHTML = fields;

  document.getElementById('dp-edit-btn').onclick = () => openModal(c);
}

function dpRow(label, val) {
  return `<div class="dp-row"><div class="dp-row-label">${label}</div><div class="dp-row-val">${val}</div></div>`;
}

function closeDetailPane() {
  selectedId = null;
  document.getElementById('detail-pane').classList.remove('open');
}

// ─── MODAL ───
function openModal(contact = null) {
  editingId = contact ? contact.id : null;
  formTags  = contact ? [...(contact.tags || [])] : [];

  document.getElementById('f-name').value         = contact?.name         || '';
  document.getElementById('f-company').value      = contact?.company      || '';
  document.getElementById('f-title').value        = contact?.title        || '';
  document.getElementById('f-email').value        = contact?.email        || '';
  document.getElementById('f-phone').value        = contact?.phone        || '';
  document.getElementById('f-linkedin').value     = contact?.linkedin     || '';
  document.getElementById('f-bucket').value       = contact?.bucket       || 'Prospects';
  document.getElementById('f-last-contact').value = contact?.last_contact || today();
  document.getElementById('f-notes').value        = contact?.notes        || '';

  document.getElementById('modal-title').textContent = contact ? contact.name : 'New Contact';
  document.getElementById('modal-sub').textContent   = contact ? 'Edit contact' : 'Add to ORBIT';
  document.getElementById('modal-avatar').innerHTML  = avatarHTML(contact?.name || '?', 38);
  document.getElementById('btn-delete').style.display = contact ? 'inline-block' : 'none';
  document.getElementById('btn-save').textContent    = contact ? 'Save Changes' : 'Add Contact';

  renderTagPills();
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 60);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editingId = null;
  formTags  = [];
}

function renderTagPills() {
  const wrap = document.getElementById('tag-wrap');
  const inp  = document.getElementById('tag-input-field');
  wrap.innerHTML = '';
  formTags.forEach(t => {
    const span = document.createElement('span');
    span.className = 'tag-pill';
    span.innerHTML = `${esc(t)} <button class="tag-remove" data-tag="${esc(t)}">×</button>`;
    span.querySelector('.tag-remove').addEventListener('click', () => {
      formTags = formTags.filter(x => x !== t);
      renderTagPills();
    });
    wrap.appendChild(span);
  });
  wrap.appendChild(inp);
  inp.focus();
}

function buildPayload() {
  return {
    name:         document.getElementById('f-name').value.trim(),
    company:      document.getElementById('f-company').value.trim() || null,
    title:        document.getElementById('f-title').value.trim()   || null,
    email:        document.getElementById('f-email').value.trim()   || null,
    phone:        document.getElementById('f-phone').value.trim()   || null,
    linkedin:     document.getElementById('f-linkedin').value.trim()|| null,
    bucket:       document.getElementById('f-bucket').value,
    last_contact: document.getElementById('f-last-contact').value   || null,
    notes:        document.getElementById('f-notes').value.trim()   || null,
    tags:         formTags,
  };
}

// ─── ESCAPE ───
function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── POPULATE SELECTS ───
function populateBucketSelect() {
  const sel = document.getElementById('f-bucket');
  BUCKETS.filter(b => b !== 'All').forEach(b => {
    const opt = document.createElement('option');
    opt.value = b; opt.textContent = b;
    sel.appendChild(opt);
  });
}

// ─── EVENT LISTENERS ───
document.getElementById('btn-add').addEventListener('click', () => openModal());

document.getElementById('search-input').addEventListener('input', (e) => {
  searchQuery = e.target.value;
  selectedId  = null;
  closeDetailPane();
  applyFilters();
});

document.querySelectorAll('.view-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentView = btn.dataset.view;
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderContacts();
  });
});

document.getElementById('sort-select').addEventListener('change', (e) => {
  sortKey = e.target.value;
  applyFilters();
});

// Column header sort click
document.getElementById('list-view').addEventListener('click', (e) => {
  const th = e.target.closest('th[data-key]');
  if (!th) return;
  const key = th.dataset.key;
  if (sortKey === key) { sortDir *= -1; } else { sortKey = key; sortDir = 1; }
  document.getElementById('sort-select').value = key;
  applyFilters();
});

// Detail pane close
document.getElementById('dp-close').addEventListener('click', () => {
  selectedId = null;
  closeDetailPane();
  renderContacts();
});

// Modal close
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('btn-cancel').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// Modal save
document.getElementById('btn-save').addEventListener('click', () => {
  const p = buildPayload();
  if (!p.name) { document.getElementById('f-name').focus(); return; }
  saveContact(p);
});

// Delete
document.getElementById('btn-delete').addEventListener('click', () => {
  if (editingId) deleteContact(editingId);
});

// Tag input
document.getElementById('tag-input-field').addEventListener('keydown', (e) => {
  const val = e.target.value.trim().replace(/,$/, '');
  if ((e.key === 'Enter' || e.key === ',') && val) {
    e.preventDefault();
    if (!formTags.includes(val)) { formTags.push(val); renderTagPills(); }
    else e.target.value = '';
  } else if (e.key === 'Backspace' && !e.target.value && formTags.length) {
    formTags.pop(); renderTagPills();
  }
});
document.getElementById('tag-input-field').addEventListener('input', (e) => {
  if (e.target.value.endsWith(',')) {
    const val = e.target.value.slice(0,-1).trim();
    if (val && !formTags.includes(val)) { formTags.push(val); renderTagPills(); }
    else e.target.value = '';
  }
});

// Update avatar preview on name input
document.getElementById('f-name').addEventListener('input', (e) => {
  document.getElementById('modal-avatar').innerHTML = avatarHTML(e.target.value || '?', 38);
  if (editingId) document.getElementById('modal-title').textContent = e.target.value || 'Edit Contact';
});

// ─── INIT ───
populateBucketSelect();
renderBucketBar();
fetchContacts();
</script>

</body>
</html>
